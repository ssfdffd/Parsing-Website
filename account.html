<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Parsing</title>
    <!-- Ensure you link your actual CSS file here -->
    <link rel="stylesheet" href="account.css"> 
</head>
<body>
    <div id="particles"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1>Parsing</h1>
            <p>Welcome back! Please login or create an account.</p>
        </div>

        <div class="toggle-container">
            <div class="toggle-slider" id="toggleSlider"></div>
            <button class="toggle-btn active" data-tab="login">Login</button>
            <button class="toggle-btn" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <form id="loginFormElement">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                    <span class="password-toggle" data-target="loginPassword">Show</span>
                </div>
                <div class="remember-me">
                    <label><input type="checkbox"> Remember me</label>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <div class="social-login">
                <p>Or continue with</p>
                <button id="githubLoginBtn" class="social-btn">GitHub</button>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container">
            <form id="signupFormElement">
                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" required>
                </div>
                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" required>
                    <span class="password-toggle" data-target="signupPassword">Show</span>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                    <span class="password-toggle" data-target="confirmPassword">Show</span>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script src="account.js"></script>
</body>
</html>
